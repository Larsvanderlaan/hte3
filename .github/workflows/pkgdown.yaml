name: site-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate committed site assets
        run: |
          test -f docs/index.html
          test -f docs/r.html
          test -f docs/sl3.html
          test -f docs/site.css
          test -f docs/site.js
          test -f docs/assets/hte3-badge-mark.svg

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
