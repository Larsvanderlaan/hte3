name: legacy-paper-smoke

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: https://tlverse.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::grf
            any::remotes
            any::SuperLearner
            any::withr

      - name: Run legacy paper smoke test
        shell: Rscript {0}
        run: source("inst/legacy/run_smoke.R")
